<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>cyber-dash</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100dvh; overflow: hidden; }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100dvh; gap: 24px;
    }
    #auth-screen h1 { font-size: 2rem; letter-spacing: 0.2em; color: #7cf; }
    #btn-login {
      padding: 12px 32px; font-size: 1rem; border: 1px solid #7cf;
      background: transparent; color: #7cf; border-radius: 6px; cursor: pointer;
    }
    #btn-login:hover { background: rgba(119,204,255,0.1); }
    #auth-error { color: #f77; font-size: 0.875rem; max-width: 300px; text-align: center; }

    /* ── Swipe container ── */
    #app { display: none; height: 100dvh; overflow: hidden; position: relative; }
    #panels {
      display: flex; width: 200%; height: 100%;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .panel { width: 50%; height: 100%; overflow-y: auto; padding: 16px; }

    /* ── Nav dots ── */
    #nav {
      position: fixed; bottom: 12px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 10px; z-index: 10;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: background 0.2s; cursor: pointer; }
    .dot.active { background: #7cf; }

    /* ── User bar ── */
    #user-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: rgba(10,10,10,0.9); border-bottom: 1px solid #222;
      backdrop-filter: blur(8px);
    }
    #user-bar span { font-size: 0.8rem; color: #888; }
    #user-bar button { font-size: 0.75rem; color: #f77; background: none; border: 1px solid #f774; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
    .panel { padding-top: 52px; padding-bottom: 36px; }

    /* ── Panel labels ── */
    .panel-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin-bottom: 16px; }

    /* ── Cards ── */
    .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .card-title { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #7cf; margin-bottom: 10px; }

    /* ── Gmail ── */
    .email-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .email-item:last-child { border-bottom: none; }
    .email-from { font-size: 0.8rem; font-weight: 600; color: #ddd; }
    .email-subject { font-size: 0.8rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-snippet { font-size: 0.72rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .email-unread .email-from { color: #fff; }
    .email-unread .email-subject { color: #ccc; }

    /* ── Calendar ── */
    .cal-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; align-items: flex-start; }
    .cal-item:last-child { border-bottom: none; }
    .cal-time { font-size: 0.72rem; color: #7cf; min-width: 52px; padding-top: 1px; white-space: pre; }
    .cal-summary { font-size: 0.82rem; color: #ddd; }
    .cal-location { font-size: 0.72rem; color: #555; margin-top: 2px; }

    /* ── Tasks ── */
    .task-item { display: flex; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
    .task-item:last-child { border-bottom: none; }
    .task-check { width: 14px; height: 14px; border: 1px solid #444; border-radius: 3px; flex-shrink: 0; }
    .task-check.done { background: #2a5; border-color: #2a5; }
    .task-title { font-size: 0.82rem; color: #ddd; }
    .task-due { font-size: 0.7rem; color: #555; margin-left: auto; white-space: nowrap; }

    /* ── Loading / empty ── */
    .loading { color: #444; font-size: 0.8rem; text-align: center; padding: 20px 0; }
    .empty { color: #333; font-size: 0.8rem; text-align: center; padding: 16px 0; }

    /* ── Refresh button ── */
    .refresh-btn { font-size: 0.75rem; color: #7cf4; background: none; border: none; cursor: pointer; float: right; margin-top: -2px; }
    .refresh-btn:hover { color: #7cf; }

    /* ── Gemini launcher panel ── */
    #panel-gemini {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; text-align: center;
    }
    #panel-gemini .panel-title { align-self: flex-start; }
    .gemini-logo { font-size: 3rem; line-height: 1; }
    .gemini-label { font-size: 0.75rem; color: #555; max-width: 240px; line-height: 1.5; }
    #btn-open-gemini {
      padding: 14px 40px; font-size: 1rem; border: 1px solid #7cf;
      background: transparent; color: #7cf; border-radius: 8px; cursor: pointer;
      letter-spacing: 0.05em;
    }
    #btn-open-gemini:hover { background: rgba(119,204,255,0.1); }
    .gemini-note { font-size: 0.7rem; color: #333; }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <h1>cyber-dash</h1>
  <button id="btn-login" onclick="startLogin()">Sign in with Google</button>
  <div id="auth-error"></div>
</div>

<!-- Main app -->
<div id="app">
  <div id="user-bar">
    <span id="user-email"></span>
    <button onclick="signOut()">sign out</button>
  </div>
  <div id="panels">
    <!-- Panel 0: Dashboard -->
    <div class="panel" id="panel-dash">
      <div class="panel-title">dashboard</div>

      <div class="card">
        <div class="card-title">inbox <button class="refresh-btn" onclick="loadAll()">↻</button></div>
        <div id="gmail-list"><div class="loading">loading…</div></div>
      </div>

      <div class="card">
        <div class="card-title">upcoming events</div>
        <div id="cal-list"><div class="loading">loading…</div></div>
      </div>

      <div class="card">
        <div class="card-title">tasks</div>
        <div id="tasks-list"><div class="loading">loading…</div></div>
      </div>
    </div>

    <!-- Panel 1: Gemini launcher -->
    <div class="panel" id="panel-gemini">
      <div class="panel-title">gemini</div>
      <div class="gemini-logo">✦</div>
      <button id="btn-open-gemini" onclick="openGemini()">Open Gemini</button>
      <div class="gemini-label">Opens the Gemini app with your existing workspace permissions — email, calendar, and tasks access included.</div>
      <div class="gemini-note" id="gemini-platform"></div>
    </div>
  </div>

  <div id="nav">
    <div class="dot active" onclick="goToPanel(0)"></div>
    <div class="dot" onclick="goToPanel(1)"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// Register this page's origin as an Authorized JavaScript Origin
// in Google Cloud Console → APIs & Services → Credentials.
// Enable: Gmail API, Google Calendar API, Tasks API
// ─────────────────────────────────────────────
const CLIENT_ID = '643098083415-aldnf1l4k3m7r19airb07s42bolg9e16.apps.googleusercontent.com';

// Read-only scopes — dashboard only. Write actions handled by native Gemini app via deep link.
const SCOPES = [
  'https://www.googleapis.com/auth/gmail.readonly',
  'https://www.googleapis.com/auth/calendar.readonly',
  'https://www.googleapis.com/auth/tasks.readonly',
  'openid', 'email', 'profile'
].join(' ');

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let accessToken = null;
let tokenClient = null;
let currentPanel = 0;

// ─────────────────────────────────────────────
// GOOGLE IDENTITY SERVICES
// ─────────────────────────────────────────────
function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showAuthError(resp.error); return; }
      accessToken = resp.access_token;
      onSignedIn();
    },
    error_callback: (err) => { showAuthError(err.type || JSON.stringify(err)); }
  });
}

function startLogin() {
  if (!tokenClient) { showAuthError('Google Identity Services not loaded yet.'); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function showAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

async function onSignedIn() {
  const info = await gapi('https://www.googleapis.com/oauth2/v3/userinfo');
  document.getElementById('user-email').textContent = info.email || '';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initGeminiPanel();
  loadAll();
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-error').textContent = '';
}

// ─────────────────────────────────────────────
// SWIPE
// ─────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, isSwiping = false;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = false;
}, { passive: true });

document.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) isSwiping = true;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!isSwiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && currentPanel === 0) goToPanel(1);
    else if (dx > 0 && currentPanel === 1) goToPanel(0);
  }
});

function goToPanel(idx) {
  currentPanel = idx;
  document.getElementById('panels').style.transform = `translateX(-${idx * 50}%)`;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

// ─────────────────────────────────────────────
// DASHBOARD — direct Google API calls
// (Gemini tools also call these same APIs)
// ─────────────────────────────────────────────
async function loadGmail() {
  const el = document.getElementById('gmail-list');
  el.innerHTML = '<div class="loading">loading…</div>';
  try {
    const r = await gapi('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=10&labelIds=INBOX');
    if (!r.messages?.length) { el.innerHTML = '<div class="empty">no messages</div>'; return; }
    const details = await Promise.all(
      r.messages.slice(0, 8).map(m =>
        gapi(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject`)
      )
    );
    el.innerHTML = details.map(msg => {
      const hdrs = Object.fromEntries((msg.payload?.headers || []).map(h => [h.name, h.value]));
      const from = (hdrs.From || '').replace(/<.*>/, '').trim() || hdrs.From || '';
      const subject = hdrs.Subject || '(no subject)';
      const unread = (msg.labelIds || []).includes('UNREAD');
      return `<div class="email-item${unread ? ' email-unread' : ''}">
        <div class="email-from">${esc(from)}</div>
        <div class="email-subject">${esc(subject)}</div>
        <div class="email-snippet">${esc(msg.snippet || '')}</div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
}

async function loadCalendar() {
  const el = document.getElementById('cal-list');
  el.innerHTML = '<div class="loading">loading…</div>';
  try {
    const now = new Date().toISOString();
    const end = new Date(Date.now() + 7 * 86400000).toISOString();
    const r = await gapi(`https://www.googleapis.com/calendar/v3/calendars/primary/events?maxResults=10&orderBy=startTime&singleEvents=true&timeMin=${encodeURIComponent(now)}&timeMax=${encodeURIComponent(end)}`);
    const items = r.items || [];
    if (!items.length) { el.innerHTML = '<div class="empty">no upcoming events</div>'; return; }
    el.innerHTML = items.map(ev => {
      const start = ev.start?.dateTime ? new Date(ev.start.dateTime) : (ev.start?.date ? new Date(ev.start.date + 'T00:00:00') : null);
      const timeStr = start ? fmtCalTime(start) : '';
      return `<div class="cal-item">
        <div class="cal-time">${esc(timeStr)}</div>
        <div>
          <div class="cal-summary">${esc(ev.summary || '(no title)')}</div>
          ${ev.location ? `<div class="cal-location">${esc(ev.location)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
}

function fmtCalTime(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(d); t.setHours(0,0,0,0);
  const diff = Math.round((t - today) / 86400000);
  const day = diff === 0 ? 'today' : diff === 1 ? 'tmrw' : d.toLocaleDateString('en', {month:'short', day:'numeric'});
  const time = d.toLocaleTimeString('en', {hour:'numeric', minute:'2-digit', hour12:true});
  return `${day}\n${time}`;
}

async function loadTasks() {
  const el = document.getElementById('tasks-list');
  el.innerHTML = '<div class="loading">loading…</div>';
  try {
    const lists = await gapi('https://tasks.googleapis.com/tasks/v1/users/@me/lists?maxResults=1');
    if (!lists.items?.length) { el.innerHTML = '<div class="empty">no task lists</div>'; return; }
    const r = await gapi(`https://tasks.googleapis.com/tasks/v1/lists/${lists.items[0].id}/tasks?maxResults=15&showCompleted=false&showHidden=false`);
    const items = r.items || [];
    if (!items.length) { el.innerHTML = '<div class="empty">no tasks</div>'; return; }
    el.innerHTML = items.map(task => {
      const done = task.status === 'completed';
      const due = task.due ? new Date(task.due).toLocaleDateString('en', {month:'short', day:'numeric'}) : '';
      return `<div class="task-item">
        <div class="task-check${done ? ' done' : ''}"></div>
        <div class="task-title">${esc(task.title || '(no title)')}</div>
        ${due ? `<div class="task-due">${esc(due)}</div>` : ''}
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
}

function loadAll() { loadGmail(); loadCalendar(); loadTasks(); }

// ─────────────────────────────────────────────
// GEMINI LAUNCHER
// iOS: no confirmed URL scheme for standalone app — opens web which
//   may hand off to the app via Safari's smart app banners.
// Android: intent URL targets com.google.android.apps.bard (Gemini's
//   package name) and falls back to the web if not installed.
// ─────────────────────────────────────────────
function detectPlatform() {
  const ua = navigator.userAgent;
  if (/android/i.test(ua)) return 'android';
  if (/iphone|ipad|ipod/i.test(ua)) return 'ios';
  return 'desktop';
}

function geminiUrl() {
  const platform = detectPlatform();
  if (platform === 'android') {
    // Android intent URL: opens Gemini app if installed, falls back to browser
    return 'intent://gemini.google.com/app#Intent;scheme=https;package=com.google.android.apps.bard;S.browser_fallback_url=https%3A%2F%2Fgemini.google.com%2Fapp;end';
  }
  // iOS and desktop: open web — Safari may hand off to the Gemini app
  return 'https://gemini.google.com/app';
}

function openGemini() {
  window.location.href = geminiUrl();
}

function initGeminiPanel() {
  const platform = detectPlatform();
  const note = document.getElementById('gemini-platform');
  if (platform === 'android') {
    note.textContent = 'Opens Gemini app · falls back to browser';
  } else if (platform === 'ios') {
    note.textContent = 'Opens in Safari · may hand off to Gemini app';
  } else {
    note.textContent = 'Opens gemini.google.com';
  }
}

// ─────────────────────────────────────────────
// GOOGLE API HELPER
// ─────────────────────────────────────────────
async function gapi(url) {
  const r = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error?.message || r.statusText); }
  return r.json();
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<!-- Google Identity Services — provides initTokenClient() -->
<script src="https://accounts.google.com/gsi/client" onload="initGIS()" async defer></script>

</body>
</html>
