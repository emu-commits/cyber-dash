<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>cyber-dash</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100dvh; overflow: hidden; }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100dvh; gap: 24px;
    }
    #auth-screen h1 { font-size: 2rem; letter-spacing: 0.2em; color: #7cf; }
    #btn-login {
      padding: 12px 32px; font-size: 1rem; border: 1px solid #7cf;
      background: transparent; color: #7cf; border-radius: 6px; cursor: pointer;
    }
    #btn-login:hover { background: rgba(119,204,255,0.1); }
    #auth-error { color: #f77; font-size: 0.875rem; max-width: 300px; text-align: center; }

    /* ── Swipe container ── */
    #app { display: none; height: 100dvh; overflow: hidden; position: relative; }
    #panels {
      display: flex; width: 200%; height: 100%;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .panel { width: 50%; height: 100%; overflow-y: auto; padding: 16px; }

    /* ── Nav dots ── */
    #nav {
      position: fixed; bottom: 12px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 10px; z-index: 10;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: background 0.2s; cursor: pointer; }
    .dot.active { background: #7cf; }

    /* ── User bar ── */
    #user-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: rgba(10,10,10,0.9); border-bottom: 1px solid #222;
      backdrop-filter: blur(8px);
    }
    #user-bar span { font-size: 0.8rem; color: #888; }
    #user-bar button { font-size: 0.75rem; color: #f77; background: none; border: 1px solid #f774; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
    .panel { padding-top: 52px; padding-bottom: 36px; }

    /* ── Panel labels ── */
    .panel-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin-bottom: 16px; }

    /* ── Cards ── */
    .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .card-title { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #7cf; margin-bottom: 10px; }

    /* ── Gmail ── */
    .email-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .email-item:last-child { border-bottom: none; }
    .email-from { font-size: 0.8rem; font-weight: 600; color: #ddd; }
    .email-subject { font-size: 0.8rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-snippet { font-size: 0.72rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .email-unread .email-from { color: #fff; }
    .email-unread .email-subject { color: #ccc; }

    /* ── Calendar ── */
    .cal-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; align-items: flex-start; }
    .cal-item:last-child { border-bottom: none; }
    .cal-time { font-size: 0.72rem; color: #7cf; min-width: 52px; padding-top: 1px; white-space: pre; }
    .cal-summary { font-size: 0.82rem; color: #ddd; }
    .cal-location { font-size: 0.72rem; color: #555; margin-top: 2px; }

    /* ── Tasks ── */
    .task-item { display: flex; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
    .task-item:last-child { border-bottom: none; }
    .task-check { width: 14px; height: 14px; border: 1px solid #444; border-radius: 3px; flex-shrink: 0; }
    .task-check.done { background: #2a5; border-color: #2a5; }
    .task-title { font-size: 0.82rem; color: #ddd; }
    .task-due { font-size: 0.7rem; color: #555; margin-left: auto; white-space: nowrap; }

    /* ── Loading / empty ── */
    .loading { color: #444; font-size: 0.8rem; text-align: center; padding: 20px 0; }
    .empty { color: #333; font-size: 0.8rem; text-align: center; padding: 16px 0; }

    /* ── Markets ── */
    .mkt-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #1a1a1a;
    }
    .mkt-row:last-child { border-bottom: none; }
    .mkt-name { font-size: 0.72rem; color: #888; min-width: 34px; }
    .mkt-spark { flex: 1; display: flex; align-items: center; }
    .mkt-spark svg { width: 100%; height: 36px; overflow: visible; }
    .mkt-info { text-align: right; }
    .mkt-price { font-size: 0.8rem; color: #ddd; white-space: nowrap; }
    .mkt-chg { font-size: 0.68rem; margin-top: 1px; }
    .mkt-chg.up { color: #4d4; }
    .mkt-chg.dn { color: #d44; }
    .mkt-error { font-size: 0.72rem; color: #555; font-style: italic; }

    /* ── Weather ── */
    .wx-hourly {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .wx-hourly::-webkit-scrollbar { display: none; }
    .wx-hour {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      min-width: 44px; padding: 6px 4px; border-radius: 6px;
      background: #0d0d0d; border: 1px solid #1a1a1a; flex-shrink: 0;
    }
    .wx-hour.now { border-color: #7cf4; background: #0d1a22; }
    .wx-hour-time { font-size: 0.62rem; color: #555; }
    .wx-hour-temp { font-size: 0.82rem; color: #ddd; font-weight: 600; }
    .wx-hour-rain { font-size: 0.62rem; color: #7af; }
    .wx-daily { margin-top: 12px; }
    .wx-day {
      display: flex; align-items: center; padding: 6px 0;
      border-bottom: 1px solid #1a1a1a; gap: 8px;
    }
    .wx-day:last-child { border-bottom: none; }
    .wx-day-name { font-size: 0.75rem; color: #888; min-width: 36px; }
    .wx-day-bar-wrap { flex: 1; display: flex; align-items: center; gap: 4px; }
    .wx-day-lo { font-size: 0.72rem; color: #555; min-width: 28px; text-align: right; }
    .wx-day-hi { font-size: 0.72rem; color: #ddd; min-width: 28px; }
    .wx-day-bar-bg { flex: 1; height: 4px; background: #1a1a1a; border-radius: 2px; position: relative; }
    .wx-day-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #4af, #fa4); position: absolute; }
    .wx-day-rain { font-size: 0.68rem; color: #7af; min-width: 32px; text-align: right; }
    .wx-location { font-size: 0.65rem; color: #333; margin-top: 8px; }

    /* ── Refresh button ── */
    .refresh-btn { font-size: 0.75rem; color: #7cf4; background: none; border: none; cursor: pointer; float: right; margin-top: -2px; }
    .refresh-btn:hover { color: #7cf; }

    /* ── Pull to refresh ── */
    #ptr {
      display: flex; align-items: center; justify-content: center;
      height: 0; overflow: hidden; gap: 8px; color: #7cf; font-size: 0.75rem;
    }
    #ptr.releasing { transition: height 0.25s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ptr-spinner {
      width: 16px; height: 16px; border: 2px solid #7cf3;
      border-top-color: #7cf; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Gemini launcher panel ── */
    #panel-gemini {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; text-align: center;
    }
    #panel-gemini .panel-title { align-self: flex-start; }
    .gemini-logo { font-size: 3rem; line-height: 1; }
    .gemini-label { font-size: 0.75rem; color: #555; max-width: 240px; line-height: 1.5; }
    #btn-open-gemini {
      padding: 14px 40px; font-size: 1rem; border: 1px solid #7cf;
      background: transparent; color: #7cf; border-radius: 8px; cursor: pointer;
      letter-spacing: 0.05em; text-decoration: none; display: inline-block;
    }
    #btn-open-gemini:hover { background: rgba(119,204,255,0.1); }
    .gemini-note { font-size: 0.7rem; color: #333; }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <h1>cyber-dash</h1>
  <button id="btn-login" onclick="startLogin()">Sign in with Google</button>
  <div id="auth-error"></div>
</div>

<!-- Main app -->
<div id="app">
  <div id="user-bar">
    <span id="user-email"></span>
    <button onclick="signOut()">sign out</button>
  </div>
  <div id="panels">
    <!-- Panel 0: Dashboard -->
    <div class="panel" id="panel-dash">
      <div id="ptr"><div class="ptr-spinner"></div><span id="ptr-label"></span></div>
      <div class="panel-title">dashboard</div>

      <div class="card">
        <div class="card-title">markets <button class="refresh-btn" onclick="loadMarkets()">↻</button></div>
        <div id="markets-body"><div class="loading">loading…</div></div>
      </div>

      <div class="card">
        <div class="card-title">weather <button class="refresh-btn" onclick="loadWeather()">↻</button></div>
        <div id="wx-body"><div class="loading">locating…</div></div>
      </div>

      <div class="card">
        <div class="card-title">inbox <button class="refresh-btn" onclick="loadAll()">↻</button></div>
        <div id="gmail-list"><div class="loading">loading…</div></div>
      </div>

      <div class="card">
        <div class="card-title">upcoming events</div>
        <div id="cal-list"><div class="loading">loading…</div></div>
      </div>

      <div class="card">
        <div class="card-title">tasks</div>
        <div id="tasks-list"><div class="loading">loading…</div></div>
      </div>
    </div>

    <!-- Panel 1: Gemini launcher -->
    <div class="panel" id="panel-gemini">
      <div class="panel-title">gemini</div>
      <div class="gemini-logo">✦</div>
      <a id="btn-open-gemini" href="https://gemini.google.com/app" target="_blank" rel="noopener noreferrer">Open Gemini</a>
      <div class="gemini-label">Opens the Gemini app with your existing workspace permissions — email, calendar, and tasks access included.</div>
      <div class="gemini-note" id="gemini-platform"></div>
    </div>
  </div>

  <div id="nav">
    <div class="dot active" onclick="goToPanel(0)"></div>
    <a class="dot" href="https://gemini.google.com/app" target="_blank" rel="noopener noreferrer"></a>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// Register this page's origin as an Authorized JavaScript Origin
// in Google Cloud Console → APIs & Services → Credentials.
// Enable: Gmail API, Google Calendar API, Tasks API
// For markets (S&P + 10Y): free key at alphavantage.co → set AV_KEY below
// ─────────────────────────────────────────────
const CLIENT_ID = '643098083415-aldnf1l4k3m7r19airb07s42bolg9e16.apps.googleusercontent.com';

// Read-only scopes — dashboard only. Write actions handled by native Gemini app via deep link.
const SCOPES = [
  'https://www.googleapis.com/auth/gmail.readonly',
  'https://www.googleapis.com/auth/calendar.readonly',
  'https://www.googleapis.com/auth/tasks.readonly',
  'openid', 'email', 'profile'
].join(' ');

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let accessToken = null;
let tokenClient = null;
let currentPanel = 0;

// ─────────────────────────────────────────────
// GOOGLE IDENTITY SERVICES
// ─────────────────────────────────────────────
function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) {
        // popup_closed_by_user is not an error worth showing
        if (resp.error !== 'popup_closed_by_user') showAuthError(resp.error);
        return;
      }
      accessToken = resp.access_token;
      // Refresh token every 55 min (tokens expire after 60); fine to call from
      // a timeout since it re-uses an existing Google session without UI
      setTimeout(() => tokenClient.requestAccessToken({
        prompt: '', login_hint: localStorage.getItem('cyberdash_hint') || ''
      }), 55 * 60 * 1000);
      onSignedIn();
    },
    error_callback: (err) => {
      // popup_failed_to_open fires when called outside a user gesture (e.g. auto-login
      // attempts). Suppress it — the login button is still visible and functional.
      if ((err.type || '') === 'popup_failed_to_open') return;
      showAuthError(err.type || JSON.stringify(err));
    }
  });
}

function startLogin() {
  if (!tokenClient) { showAuthError('Google Identity Services not loaded yet.'); return; }
  showAuthError('');
  // login_hint skips account picker on repeat visits
  tokenClient.requestAccessToken({ prompt: '', login_hint: localStorage.getItem('cyberdash_hint') || '' });
}

function showAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

async function onSignedIn() {
  const info = await gapi('https://www.googleapis.com/oauth2/v3/userinfo');
  document.getElementById('user-email').textContent = info.email || '';
  localStorage.setItem('cyberdash_hint', info.email || '');
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initGeminiPanel();
  loadAll();
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  localStorage.removeItem('cyberdash_hint');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-error').textContent = '';
}

// ─────────────────────────────────────────────
// SWIPE (horizontal — panel nav / Gemini launch)
// ─────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, isSwiping = false;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = false;
}, { passive: true });

document.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) isSwiping = true;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!isSwiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && currentPanel === 0) {
      // window.location.href always works from a touch handler on iOS.
      // User taps the iOS back button (<) to return to cyber-dash.
      window.location.href = 'https://gemini.google.com/app';
    }
    else if (dx > 0 && currentPanel === 1) goToPanel(0);
  }
});

function goToPanel(idx) {
  currentPanel = idx;
  document.getElementById('panels').style.transform = `translateX(-${idx * 50}%)`;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

// ─────────────────────────────────────────────
// PULL TO REFRESH
// ─────────────────────────────────────────────
const dashPanel = document.getElementById('panel-dash');
const ptrEl = document.getElementById('ptr');
const ptrLabel = document.getElementById('ptr-label');
const PTR_THRESHOLD = 60;
let ptrState = 'idle'; // idle | watching | pulling
let ptrStartX = 0, ptrStartY = 0, ptrDist = 0;

dashPanel.addEventListener('touchstart', e => {
  if (dashPanel.scrollTop <= 0) {
    ptrStartX = e.touches[0].clientX;
    ptrStartY = e.touches[0].clientY;
    ptrState = 'watching';
    ptrDist = 0;
  }
}, { passive: true });

dashPanel.addEventListener('touchmove', e => {
  if (ptrState === 'idle') return;
  const dy = e.touches[0].clientY - ptrStartY;
  const dx = Math.abs(e.touches[0].clientX - ptrStartX);

  if (ptrState === 'watching') {
    if (dx > 10) { ptrState = 'idle'; return; } // horizontal — let swipe handler take it
    if (dy > 8) ptrState = 'pulling'; else return;
  }

  ptrDist = Math.max(0, Math.min(dy * 0.45, PTR_THRESHOLD * 1.2));
  ptrEl.style.height = ptrDist + 'px';
  ptrLabel.textContent = ptrDist >= PTR_THRESHOLD ? 'release to refresh' : 'pull to refresh';
}, { passive: true });

dashPanel.addEventListener('touchend', () => {
  if (ptrState !== 'pulling') { ptrState = 'idle'; return; }
  ptrState = 'idle';
  ptrEl.classList.add('releasing');
  if (ptrDist >= PTR_THRESHOLD) {
    ptrEl.style.height = '44px';
    ptrLabel.textContent = 'refreshing…';
    loadAll();
    setTimeout(() => { ptrEl.style.height = '0'; setTimeout(() => ptrEl.classList.remove('releasing'), 300); }, 1200);
  } else {
    ptrEl.style.height = '0';
    setTimeout(() => ptrEl.classList.remove('releasing'), 300);
  }
  ptrDist = 0;
});

// ─────────────────────────────────────────────
// DASHBOARD — direct Google API calls
// (Gemini tools also call these same APIs)
// ─────────────────────────────────────────────
async function loadGmail() {
  const el = document.getElementById('gmail-list');
  el.innerHTML = '<div class="loading">loading…</div>';
  try {
    const r = await gapi('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=10&labelIds=INBOX');
    if (!r.messages?.length) { el.innerHTML = '<div class="empty">no messages</div>'; return; }
    const details = await Promise.all(
      r.messages.slice(0, 8).map(m =>
        gapi(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject`)
      )
    );
    el.innerHTML = details.map(msg => {
      const hdrs = Object.fromEntries((msg.payload?.headers || []).map(h => [h.name, h.value]));
      const from = (hdrs.From || '').replace(/<.*>/, '').trim() || hdrs.From || '';
      const subject = hdrs.Subject || '(no subject)';
      const unread = (msg.labelIds || []).includes('UNREAD');
      return `<div class="email-item${unread ? ' email-unread' : ''}">
        <div class="email-from">${esc(from)}</div>
        <div class="email-subject">${esc(subject)}</div>
        <div class="email-snippet">${esc(msg.snippet || '')}</div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
}

async function loadCalendar() {
  const el = document.getElementById('cal-list');
  el.innerHTML = '<div class="loading">loading…</div>';
  try {
    const now = new Date().toISOString();
    const end = new Date(Date.now() + 7 * 86400000).toISOString();
    const r = await gapi(`https://www.googleapis.com/calendar/v3/calendars/primary/events?maxResults=10&orderBy=startTime&singleEvents=true&timeMin=${encodeURIComponent(now)}&timeMax=${encodeURIComponent(end)}`);
    const items = r.items || [];
    if (!items.length) { el.innerHTML = '<div class="empty">no upcoming events</div>'; return; }
    el.innerHTML = items.map(ev => {
      const start = ev.start?.dateTime ? new Date(ev.start.dateTime) : (ev.start?.date ? new Date(ev.start.date + 'T00:00:00') : null);
      const timeStr = start ? fmtCalTime(start) : '';
      return `<div class="cal-item">
        <div class="cal-time">${esc(timeStr)}</div>
        <div>
          <div class="cal-summary">${esc(ev.summary || '(no title)')}</div>
          ${ev.location ? `<div class="cal-location">${esc(ev.location)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
}

function fmtCalTime(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(d); t.setHours(0,0,0,0);
  const diff = Math.round((t - today) / 86400000);
  const day = diff === 0 ? 'today' : diff === 1 ? 'tmrw' : d.toLocaleDateString('en', {month:'short', day:'numeric'});
  const time = d.toLocaleTimeString('en', {hour:'numeric', minute:'2-digit', hour12:true});
  return `${day}\n${time}`;
}

async function loadTasks() {
  const el = document.getElementById('tasks-list');
  el.innerHTML = '<div class="loading">loading…</div>';
  try {
    const lists = await gapi('https://tasks.googleapis.com/tasks/v1/users/@me/lists?maxResults=1');
    if (!lists.items?.length) { el.innerHTML = '<div class="empty">no task lists</div>'; return; }
    const r = await gapi(`https://tasks.googleapis.com/tasks/v1/lists/${lists.items[0].id}/tasks?maxResults=15&showCompleted=false&showHidden=false`);
    const items = r.items || [];
    if (!items.length) { el.innerHTML = '<div class="empty">no tasks</div>'; return; }
    el.innerHTML = items.map(task => {
      const done = task.status === 'completed';
      const due = task.due ? new Date(task.due).toLocaleDateString('en', {month:'short', day:'numeric'}) : '';
      return `<div class="task-item">
        <div class="task-check${done ? ' done' : ''}"></div>
        <div class="task-title">${esc(task.title || '(no title)')}</div>
        ${due ? `<div class="task-due">${esc(due)}</div>` : ''}
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
}

function loadAll() { loadMarkets(); loadWeather(); loadGmail(); loadCalendar(); loadTasks(); }

// ─────────────────────────────────────────────
// MARKETS
// BTC   — CoinGecko: bitcoin
// S&P   — CoinGecko: IVVon (Ondo tokenized IVV ETF)
// 10Y   — US Treasury Fiscal Data API (no key, CORS-friendly)
// ─────────────────────────────────────────────
const MARKET_ASSETS = [
  { label: 'BTC', cgId: 'bitcoin',                                     fmt: p => '$' + (p >= 1000 ? (p/1000).toFixed(1)+'k' : p.toFixed(0)) },
  { label: 'S&P', cgId: 'ishares-core-s-p-500-etf-ondo-tokenized-etf', fmt: p => '$' + p.toFixed(2) },
  { label: '10Y', cgId: 'superstate-short-duration-us-government-securities-fund', fmt: p => '$' + p.toFixed(2) },
];

async function loadMarkets() {
  const el = document.getElementById('markets-body');
  el.innerHTML = '<div class="loading">loading…</div>';
  const results = await Promise.all(MARKET_ASSETS.map(a =>
    fetchCoinGecko(a.cgId).catch(e => ({ error: e.message }))
  ));
  el.innerHTML = MARKET_ASSETS.map((asset, i) => {
    const d = results[i];
    if (d.error) return `<div class="mkt-row">
      <div class="mkt-name">${asset.label}</div>
      <div class="mkt-error">${esc(d.error)}</div>
    </div>`;
    const { prices } = d;
    const pct = (prices[prices.length - 1] - prices[0]) / prices[0] * 100;
    const isUp = pct >= 0;
    return `<div class="mkt-row">
      <div class="mkt-name">${asset.label}</div>
      <div class="mkt-spark">${mkSparkline(prices, isUp)}</div>
      <div class="mkt-info">
        <div class="mkt-price">${asset.fmt(prices[prices.length - 1])}</div>
        <div class="mkt-chg ${isUp ? 'up' : 'dn'}">${isUp ? '+' : ''}${pct.toFixed(2)}%</div>
      </div>
    </div>`;
  }).join('');
}

async function fetchCoinGecko(coinId) {
  const r = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=7&interval=daily`);
  if (!r.ok) throw new Error('CG ' + r.status);
  const d = await r.json();
  const prices = d.prices.map(p => p[1]).slice(-7);
  if (prices.length < 2) throw new Error('insufficient data');
  return { prices };
}


function mkSparkline(prices, isUp) {
  const W = 100, H = 36, PAD = 2;
  const min = Math.min(...prices) - PAD;
  const max = Math.max(...prices) + PAD;
  const range = max - min || 1;
  const n = prices.length;
  const pts = prices.map((p, i) => {
    const x = (i / (n - 1)) * W;
    const y = H - ((p - min) / range) * H;
    return [x.toFixed(1), y.toFixed(1)];
  });
  const linePoints = pts.map(p => p.join(',')).join(' ');
  // Filled area path: line points + close along the bottom
  const areaPath = `M ${pts[0].join(',')} `
    + pts.slice(1).map(p => `L ${p.join(',')}`).join(' ')
    + ` L ${pts[pts.length-1][0]},${H} L ${pts[0][0]},${H} Z`;
  const stroke = isUp ? '#3c3' : '#c33';
  const fill   = isUp ? 'rgba(51,204,51,0.08)' : 'rgba(204,51,51,0.08)';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${areaPath}" fill="${fill}" stroke="none"/>
    <polyline points="${linePoints}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ─────────────────────────────────────────────
// WEATHER — Open-Meteo (free, no API key)
// ─────────────────────────────────────────────
function loadWeather() {
  const el = document.getElementById('wx-body');
  el.innerHTML = '<div class="loading">locating…</div>';
  if (!navigator.geolocation) { el.innerHTML = '<div class="empty">geolocation not supported</div>'; return; }
  navigator.geolocation.getCurrentPosition(
    pos => fetchWeather(pos.coords.latitude, pos.coords.longitude, el),
    () => el.innerHTML = '<div class="empty">location access denied</div>',
    { timeout: 10000 }
  );
}

async function fetchWeather(lat, lon, el) {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&hourly=temperature_2m,precipitation_probability,precipitation`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max`
      + `&temperature_unit=fahrenheit&precipitation_unit=inch`
      + `&wind_speed_unit=mph&timezone=${encodeURIComponent(tz)}&forecast_days=7`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.statusText);
    const d = await r.json();
    renderWeather(d, lat, lon, el);
  } catch(e) { el.innerHTML = `<div class="empty">weather error: ${esc(e.message)}</div>`; }
}

function renderWeather(d, lat, lon, el) {
  const now = new Date();
  const nowHour = now.toISOString().slice(0, 13); // "2025-04-04T14"

  // ── Hourly: next 7 hours ──
  const hTimes = d.hourly.time;
  const hTemp  = d.hourly.temperature_2m;
  const hPop   = d.hourly.precipitation_probability;
  const startIdx = hTimes.findIndex(t => t >= nowHour);
  const hourSlice = Array.from({length: 7}, (_, i) => startIdx + i).filter(i => i < hTimes.length);

  const hourHTML = hourSlice.map((i, pos) => {
    const t = new Date(hTimes[i]);
    const label = pos === 0 ? 'now' : t.toLocaleTimeString('en', {hour:'numeric', hour12:true}).toLowerCase().replace(' ','');
    const pop = hPop[i] ?? 0;
    return `<div class="wx-hour${pos === 0 ? ' now' : ''}">
      <div class="wx-hour-time">${label}</div>
      <div class="wx-hour-temp">${Math.round(hTemp[i])}°</div>
      <div class="wx-hour-rain">${pop > 0 ? pop + '%' : '—'}</div>
    </div>`;
  }).join('');

  // ── Daily: 7 days ──
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dTimes = d.daily.time;
  const dHi    = d.daily.temperature_2m_max;
  const dLo    = d.daily.temperature_2m_min;
  const dPop   = d.daily.precipitation_probability_max;
  const dPrecip = d.daily.precipitation_sum;

  // Temperature range across all 7 days for bar scaling
  const allHi = Math.max(...dHi), allLo = Math.min(...dLo);
  const range = allHi - allLo || 1;

  const dayHTML = dTimes.map((t, i) => {
    const date = new Date(t + 'T12:00:00');
    const isToday = i === 0;
    const name = isToday ? 'today' : days[date.getDay()];
    const pop = dPop[i] ?? 0;
    const precip = dPrecip[i] ?? 0;
    // Bar: left offset and width scaled to the week's temp range
    const left = ((dLo[i] - allLo) / range * 100).toFixed(1);
    const width = ((dHi[i] - dLo[i]) / range * 100).toFixed(1);
    const rainLabel = pop > 0 ? (precip > 0.05 ? precip.toFixed(2) + '"' : pop + '%') : '—';
    return `<div class="wx-day">
      <div class="wx-day-name">${name}</div>
      <div class="wx-day-bar-wrap">
        <div class="wx-day-lo">${Math.round(dLo[i])}°</div>
        <div class="wx-day-bar-bg"><div class="wx-day-bar" style="left:${left}%;width:${width}%"></div></div>
        <div class="wx-day-hi">${Math.round(dHi[i])}°</div>
      </div>
      <div class="wx-day-rain">${rainLabel}</div>
    </div>`;
  }).join('');

  // Reverse geocode city name via Open-Meteo's geocoding isn't available,
  // so show rounded coordinates as a lightweight location hint
  const locLabel = `${Math.abs(lat).toFixed(2)}°${lat>=0?'N':'S'} ${Math.abs(lon).toFixed(2)}°${lon>=0?'E':'W'}`;

  el.innerHTML = `
    <div class="wx-hourly">${hourHTML}</div>
    <div class="wx-daily">${dayHTML}</div>
    <div class="wx-location">${locLabel}</div>`;
}

// ─────────────────────────────────────────────
// GEMINI LAUNCHER
// iOS: no confirmed URL scheme for standalone app — opens web which
//   may hand off to the app via Safari's smart app banners.
// Android: intent URL targets com.google.android.apps.bard (Gemini's
//   package name) and falls back to the web if not installed.
// ─────────────────────────────────────────────
function detectPlatform() {
  const ua = navigator.userAgent;
  if (/android/i.test(ua)) return 'android';
  if (/iphone|ipad|ipod/i.test(ua)) return 'ios';
  return 'desktop';
}

function openGemini() {
  // Programmatic anchor click bypasses popup blocking that affects window.open()
  // when called from touch event handlers on iOS/mobile.
  // On iOS Safari this opens a Safari View Controller (modal); tapping Done returns here.
  const a = document.createElement('a');
  a.href = 'https://gemini.google.com/app';
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function initGeminiPanel() {
  const platform = detectPlatform();
  const note = document.getElementById('gemini-platform');
  note.textContent = platform === 'ios'
    ? 'Opens as Safari modal · tap Done to return'
    : platform === 'android' ? 'Opens in new tab' : 'Opens gemini.google.com';
}

// ─────────────────────────────────────────────
// GOOGLE API HELPER
// ─────────────────────────────────────────────
async function gapi(url) {
  const r = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error?.message || r.statusText); }
  return r.json();
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
